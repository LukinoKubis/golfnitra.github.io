faq_question: "Majú golfové ihriská právo povedať mi, že nemôžem vyučovať na ich tréningových a hracích plochách?"
faq_answer: |
  Áno, golfové ihriská majú vo všeobecnosti právo obmedziť aktivity na svojom pozemku, vrátane výučby vo svojich tréningových priestoroch. Dôvody zahŕňajú:

  - **Zodpovednosť a poistenie** — ihriská môžu mať poistné zmluvy obmedzujúce, kto môže poskytovať služby v ich priestoroch.
  - **Obchodné záujmy** — mnohé ihriská majú vlastných lektorov alebo programy.
  - **Kontrola prostredia** — kluby chcú zachovať atmosféru a zabezpečiť súlad aktivít s ich štandardmi.
  - **Pravidlá a predpisy** — väčšina ihrísk má špecifické pravidlá týkajúce sa používania zariadení.

  Ak uvažujete o výučbe na našom ihrisku, kontaktujte vedenie GK Meander.
